<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Minecraft 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
#c{position:fixed;inset:0;width:100%;height:100%;display:block;}

/* crosshair */
#cross{position:fixed;top:50%;left:50%;width:0;height:0;pointer-events:none;z-index:30;}
#cross::before,#cross::after{content:'';position:absolute;background:rgba(255,255,255,.85);box-shadow:0 0 0 1px rgba(0,0,0,.6);}
#cross::before{width:18px;height:2px;top:-1px;left:-9px;}
#cross::after{width:2px;height:18px;top:-9px;left:-1px;}

/* hotbar */
#hotbar{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);display:flex;z-index:25;background:rgba(0,0,0,.5);border:2px solid rgba(255,255,255,.3);padding:2px;gap:2px;pointer-events:none;}
.hs{width:44px;height:44px;border:2px solid #555;background:rgba(80,80,80,.6);display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;cursor:pointer;pointer-events:all;flex-shrink:0;}
.hs.on{border-color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,.4);}
.hs span{font-size:8px;position:absolute;bottom:1px;right:3px;color:#fff;text-shadow:1px 1px #000;font-family:monospace;}

/* bars */
#bars{position:fixed;bottom:54px;left:50%;transform:translateX(-50%);display:flex;justify-content:space-between;width:404px;pointer-events:none;z-index:25;}
.bar-row{display:flex;gap:1px;}
.ico{width:18px;height:18px;display:inline-block;background-size:contain;image-rendering:pixelated;}

/* xp */
#xpb{position:fixed;bottom:51px;left:50%;transform:translateX(-50%);width:182px;height:4px;background:#000;z-index:25;}
#xpf{height:100%;width:0;background:#7CFC00;}

/* msg */
#msg{position:fixed;top:33%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:#fff;padding:4px 14px;font-size:11px;pointer-events:none;z-index:30;opacity:0;transition:opacity .3s;font-family:monospace;border:1px solid rgba(255,255,255,.2);}

/* break progress */
#brk{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);width:110px;height:7px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.3);display:none;z-index:30;}
#brkf{height:100%;width:0;background:#e74c3c;}

/* hud corner */
#hud{position:fixed;top:4px;left:6px;font-size:9px;color:#fff;text-shadow:1px 1px #000;font-family:monospace;line-height:1.7;pointer-events:none;z-index:25;display:none;}

/* start */
#start{position:fixed;inset:0;background:linear-gradient(180deg,#1a3050,#0a0f1a);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:100;}
#start h1{font-size:32px;color:#fff;text-shadow:3px 3px #000,0 0 20px rgba(0,150,255,.5);letter-spacing:4px;font-family:monospace;}
#start p{font-size:10px;color:#aaa;text-align:center;line-height:1.9;font-family:monospace;max-width:300px;}
.btn{padding:10px 30px;background:linear-gradient(180deg,#777,#444);border:2px solid #fff;border-bottom-color:#222;color:#fff;font-size:13px;cursor:pointer;font-family:monospace;text-shadow:1px 1px #000;letter-spacing:1px;}
.btn:active{filter:brightness(.8);}

/* death */
#dead{position:fixed;inset:0;background:rgba(160,0,0,.55);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:100;}
#dead h1{font-size:28px;color:#fff;text-shadow:2px 2px #000;font-family:monospace;}
#dead p{font-size:11px;color:#fcc;font-family:monospace;}

/* mobile joystick */
#jw{position:fixed;bottom:60px;left:10px;width:120px;height:120px;pointer-events:all;z-index:24;}
#jb{position:absolute;inset:10px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.18);}
#jk{position:absolute;width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 32%,rgba(255,255,255,.5),rgba(200,200,200,.15));border:2px solid rgba(255,255,255,.5);box-shadow:0 3px 10px rgba(0,0,0,.5);top:39px;left:39px;}

/* look zone */
#lz{position:fixed;top:0;bottom:56px;right:0;left:38%;pointer-events:all;z-index:23;}
.By {
    color: #FFFFFF;                  /* สีตัวอักษร */
-webkit-text-stroke: 0.3px #000000; /* ความหนา + สีขอบ */
}
/* right btns */
#rb{position:fixed;bottom:62px;right:10px;display:flex;flex-direction:column;align-items:flex-end;gap:7px;z-index:24;pointer-events:all;}
#rbr{display:flex;gap:7px;}
.ab{width:54px;height:54px;border-radius:50%;border:none;font-size:20px;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;user-select:none;pointer-events:all;}
.ab:active{transform:translateY(5px);box-shadow:none;}
#bj{width:60px;height:60px;background:rgba(39,174,96,.9);border:3px solid #27AE60;}
#bb{background:rgba(231,76,60,.9);border:3px solid #C0392B;}
#bp{background:rgba(41,128,185,.9);border:3px solid #2471A3;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="cross"></div>
<div id="hud"></div>
<div id="bars"><div class="bar-row" id="hpr"></div><div class="bar-row" id="hur"></div></div>
<div id="xpb"><div id="xpf"></div></div>
<div id="hotbar"></div>
<div id="msg"></div>
<div id="brk"><div id="brkf"></div></div>

<div id="start">
  <h90 class="By">Created by FIATX2 or jubjibphudtaraksa</h90>
  <h1>MINECRAFT</h1>
  <p id="stip">Loading world...</p>
  <button class="btn" id="btnS" style="display:none">▶ Play</button>
</div>
<div id="dead"><h1>You Died!</h1><p id="dscore"></p><button class="btn" id="btnR">Respawn</button></div>

<!-- mobile only -->
<div id="jw" style="display:none"><div id="jb"></div><div id="jk"></div></div>
<div id="lz" style="display:none"></div>
<div id="rb" style="display:none">
  <div id="rbr">
    <button class="ab" id="bb">⛏</button>
    <button class="ab" id="bp">📦</button>
  </div>
  <button class="ab" id="bj">▲</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── detect mobile ──
const MOB=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||('ontouchstart' in window);

// ════════════════ RENDERER ════════════════
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:false,powerPreference:'high-performance'});
renderer.setPixelRatio(MOB?1:Math.min(devicePixelRatio,1.5));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=false;
renderer.setClearColor(0x7EB6FF);

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x7EB6FF,.04);

const cam=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,.05,80);
cam.rotation.order='YXZ';

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff,.6));
const dirLight=new THREE.DirectionalLight(0xFFFBF0,0.9);
dirLight.position.set(1,2,1);
scene.add(dirLight);
scene.add(new THREE.HemisphereLight(0x87CEEB,0x4a6741,.4));

// ── Sky ──
const skyGeo=new THREE.SphereGeometry(75,8,4);
const skyMat=new THREE.MeshBasicMaterial({color:0x7EB6FF,side:THREE.BackSide});
scene.add(new THREE.Mesh(skyGeo,skyMat));

// ── Highlight box ──
const hlBox=new THREE.Mesh(
  new THREE.BoxGeometry(1.005,1.005,1.005),
  new THREE.MeshBasicMaterial({color:0x000000,wireframe:true,transparent:true,opacity:.5})
);
hlBox.visible=false;
scene.add(hlBox);

// ════════════════ BLOCK DEFS ════════════════
const DEFS={
  grass: {t:0x5D9E2F,s:0x8B6340,b:0x7D5020,hard:.6,icon:'🟩'},
  dirt:  {t:0x8B6340,s:0x8B6340,b:0x7D5020,hard:.5,icon:'🟫'},
  stone: {t:0x909090,s:0x787878,b:0x606060,hard:1.5,icon:'🪨'},
  wood:  {t:0xA08050,s:0x806030,b:0xA08050,hard:2.0,icon:'🪵'},
  leaves:{t:0x3D7A29,s:0x2E6020,b:0x2E6020,hard:.2,icon:'🌿',alpha:.9},
  sand:  {t:0xE8D48A,s:0xC9B45A,b:0xC9B45A,hard:.5,icon:'🟨'},
  planks:{t:0xC09850,s:0xC09850,b:0xC09850,hard:2.0,icon:'🪓'},
  cobble:{t:0x808080,s:0x686868,b:0x505050,hard:2.0,icon:'🧱'},
  glass: {t:0xADD8E6,s:0xADD8E6,b:0xADD8E6,hard:.3,icon:'🔵',alpha:.35},
  brick: {t:0xC0392B,s:0x922B21,b:0x7B241C,hard:2.0,icon:'🧱'},
  snow:  {t:0xEEEEEE,s:0xDDDDDD,b:0xDDDDDD,hard:.1,icon:'⬜'},
  gold:  {t:0xD4AC0D,s:0xB8960C,b:0x9A7D0A,hard:3.0,icon:'🟡'},
  coal:  {t:0x383838,s:0x282828,b:0x202020,hard:3.0,icon:'⬛'},
  water: {t:0x1A78C2,s:0x1560A0,b:0x1048A0,hard:100,icon:'🔵',alpha:.55},
};

const HOTBAR_TYPES=['grass','dirt','stone','planks','cobble','sand','glass','gold','wood'];

// ════════════════ TEXTURE CACHE ════════════════
const _tc={};
function mkTex(hex,seed=0,mode='solid'){
  const k=hex+'_'+mode;
  if(_tc[k]) return _tc[k];
  const S=16,cv2=document.createElement('canvas');cv2.width=cv2.height=S;
  const c=cv2.getContext('2d');
  if(mode==='glass'){
    c.fillStyle=`rgba(${hex>>16&255},${hex>>8&255},${hex&255},.3)`;c.fillRect(0,0,S,S);
    c.strokeStyle='rgba(255,255,255,.5)';c.lineWidth=1;c.strokeRect(.5,.5,S-1,S-1);
  } else if(mode==='water'){
    c.fillStyle=`rgba(${hex>>16&255},${hex>>8&255},${hex&255},.65)`;c.fillRect(0,0,S,S);
    for(let i=0;i<3;i++){c.fillStyle='rgba(255,255,255,.08)';c.fillRect(i*6,i*2,S,2);}
  } else {
    const r=hex>>16&255,g=hex>>8&255,b=hex&255;
    c.fillStyle=`rgb(${r},${g},${b})`;c.fillRect(0,0,S,S);
    const rng=n=>{const x=Math.sin(n*127.1+seed*311.7)*43758.5453;return x-Math.floor(x);};
    for(let i=0;i<S*S;i++){
      const px=i%S,py=i>>4,n=rng(px*16+py);
      const d=~~((n-.5)*32);
      c.fillStyle=`rgba(0,0,0,${n>.7?.12:n<.3?.08:0})`;
      c.fillRect(px,py,1,1);
    }
    c.strokeStyle='rgba(0,0,0,.15)';c.lineWidth=.5;
    [4,8,12].forEach(i=>{c.beginPath();c.moveTo(i,0);c.lineTo(i,S);c.stroke();c.beginPath();c.moveTo(0,i);c.lineTo(S,i);c.stroke();});
  }
  const t=new THREE.CanvasTexture(cv2);
  t.magFilter=THREE.NearestFilter;t.minFilter=THREE.NearestMipmapNearestFilter;
  _tc[k]=t;return t;
}

const _mc={};
function getMats(type){
  if(_mc[type]) return _mc[type];
  const d=DEFS[type];if(!d) return null;
  const isG=type==='glass',isW=type==='water',isL=type==='leaves';
  const mo=mode=>isG?'glass':isW?'water':mode;
  const alpha=d.alpha??1;
  const opts={transparent:alpha<1,opacity:alpha,depthWrite:alpha>0.5};
  _mc[type]=[
    new THREE.MeshLambertMaterial({...opts,map:mkTex(d.s,1,mo('solid'))}),
    new THREE.MeshLambertMaterial({...opts,map:mkTex(d.s,2,mo('solid'))}),
    new THREE.MeshLambertMaterial({...opts,map:mkTex(type==='grass'?0x4CAF50:d.t,3,mo(type==='grass'?'top':'solid'))}),
    new THREE.MeshLambertMaterial({...opts,map:mkTex(d.b,4,mo('solid'))}),
    new THREE.MeshLambertMaterial({...opts,map:mkTex(d.s,5,mo('solid'))}),
    new THREE.MeshLambertMaterial({...opts,map:mkTex(d.s,6,mo('solid'))}),
  ];
  return _mc[type];
}

// ════════════════ WORLD ════════════════
const WX=24,WZ=24,WY=16;
const world={};
const meshes={};
const geo=new THREE.BoxGeometry(1,1,1);

const K=(x,y,z)=>x+','+y+','+z;

function addMesh(x,y,z,type){
  const k=K(x,y,z);
  if(meshes[k]){scene.remove(meshes[k]);delete meshes[k];}
  const mats=getMats(type);if(!mats)return;
  const m=new THREE.Mesh(geo,mats);
  m.position.set(x+.5,y+.5,z+.5);
  m.userData={type,x,y,z};
  scene.add(m);meshes[k]=m;
}

function setBlock(x,y,z,type){
  const k=K(x,y,z);
  if(meshes[k]){scene.remove(meshes[k]);delete meshes[k];}
  if(!type){delete world[k];return;}
  world[k]=type;addMesh(x,y,z,type);
}

function hasBlock(x,y,z){return !!world[K(~~x,~~y,~~z)];}
function isSolid(x,y,z){const t=world[K(~~x,~~y,~~z)];return !!t&&t!=='water'&&t!=='glass'&&t!=='leaves';}

// ── Terrain gen ──
function hmap(x,z){
  return Math.max(1,Math.min(WY-3,
    Math.floor(5+Math.sin(x*.35)*2+Math.cos(z*.28)*2+Math.sin(x*.15+z*.2)*1.5)
  ));
}

function genWorld(){
  for(let x=0;x<WX;x++) for(let z=0;z<WZ;z++){
    const h=hmap(x,z);
    world[K(x,0,z)]='stone';
    for(let y=1;y<=h;y++){
      world[K(x,y,z)]=y===h?(h<=3?'sand':'grass'):y>=h-2?'dirt':'stone';
    }
    if(h<=3) for(let y=h+1;y<=4;y++) world[K(x,y,z)]='water';
  }

  [[5,5],[8,15],[16,6],[18,18],[4,20],[20,4]].forEach(([tx,tz])=>{
    if(tx<2||tx>WX-3||tz<2||tz>WZ-3) return;
    const h=hmap(tx,tz);if(h<=3) return;
    const th=h+~~(Math.random()*2+4);
    for(let y=h+1;y<=th;y++) world[K(tx,y,tz)]='wood';
    for(let lx=tx-2;lx<=tx+2;lx++) for(let lz=tz-2;lz<=tz+2;lz++)
      for(let ly=th-1;ly<=th+2;ly++){
        if(Math.abs(lx-tx)+Math.abs(lz-tz)>3) continue;
        if(!world[K(lx,ly,lz)]) world[K(lx,ly,lz)]='leaves';
      }
  });

  const hx=14,hz=12;
  const hh=hmap(hx,hz)+1;
  for(let bx=hx;bx<=hx+4;bx++) for(let bz=hz;bz<=hz+4;bz++){
    world[K(bx,hh-1,bz)]='planks';
    for(let by=hh;by<hh+3;by++){
      const wall=bx===hx||bx===hx+4||bz===hz||bz===hz+4;
      if(wall){
        if(bx===hx+2&&bz===hz&&by<hh+2) continue;
        world[K(bx,by,bz)]='cobble';
      }
    }
    world[K(bx,hh+3,bz)]='planks';
  }

  for(const [k,type] of Object.entries(world)){
    const [x,y,z]=k.split(',').map(Number);
    addMesh(x,y,z,type);
  }
}

genWorld();

// ════════════════ PLAYER ════════════════
const P={
  pos:new THREE.Vector3(WX/2,hmap(WX/2,WZ/2)+2,WZ/2),
  vel:new THREE.Vector3(),
  yaw:0,pitch:0,
  onGround:false,
  hp:20,hunger:20,xp:0,level:0,score:0,dead:false
};

function respawnPos(){
  const x=~~(WX/2),z=~~(WZ/2);
  for(let y=WY;y>=0;y--) if(world[K(x,y,z)]) return new THREE.Vector3(x+.5,y+2,z+.5);
  return new THREE.Vector3(x+.5,8,z+.5);
}

// ════════════════ PHYSICS ════════════════
const GRAVITY=-26,JUMP=9,SPEED=5;

function collides(pos){
  const R=.28,yB=pos.y-1.75,yT=pos.y-.1;
  for(const dx of[-R,0,R]) for(const dz of[-R,0,R]){
    if(isSolid(pos.x+dx,yB,pos.z+dz)||isSolid(pos.x+dx,yT,pos.z+dz)) return true;
  }
  return false;
}
function grounded(pos){
  const R=.25;
  for(const dx of[-R,R]) for(const dz of[-R,R]) if(isSolid(pos.x+dx,pos.y-1.82,pos.z+dz)) return true;
  return false;
}
function inWater(pos){return world[K(~~pos.x,~~(pos.y-.5),~~pos.z)]==='water';}

const _fwd=new THREE.Vector3(),_rt=new THREE.Vector3(),_mv=new THREE.Vector3(),_tp=new THREE.Vector3();

function tickPhysics(dt){
  if(P.dead) return;

  _fwd.set(Math.sin(P.yaw),0,Math.cos(P.yaw));
  _rt.set(Math.cos(P.yaw),0,-Math.sin(P.yaw));
  _mv.set(0,0,0);

  if(keys.KeyW||keys.ArrowUp) _mv.addScaledVector(_fwd,-1);
  if(keys.KeyS||keys.ArrowDown) _mv.addScaledVector(_fwd,1);
  if(keys.KeyA||keys.ArrowLeft) _mv.addScaledVector(_rt,-1);
  if(keys.KeyD||keys.ArrowRight) _mv.addScaledVector(_rt,1);
  if(Math.abs(jX)>.08) _mv.addScaledVector(_rt,jX);
  if(Math.abs(jY)>.08) _mv.addScaledVector(_fwd,-jY);

  if(_mv.lengthSq()>0) _mv.normalize();
  const wet=inWater(P.pos),spd=SPEED*(wet?.5:1);
  P.vel.x=_mv.x*spd; P.vel.z=_mv.z*spd;

  P.vel.y+=GRAVITY*(wet?.25:1)*dt;
  if(P.vel.y<-35) P.vel.y=-35;
  if(wet&&P.vel.y<-2) P.vel.y=-2;

  _tp.copy(P.pos); _tp.x+=P.vel.x*dt;
  if(!collides(_tp)) P.pos.x=_tp.x; else P.vel.x=0;
  _tp.copy(P.pos); _tp.z+=P.vel.z*dt;
  if(!collides(_tp)) P.pos.z=_tp.z; else P.vel.z=0;
  _tp.copy(P.pos); _tp.y+=P.vel.y*dt;
  if(!collides(_tp)){P.pos.y=_tp.y; P.onGround=false;}
  else{if(P.vel.y<0) P.onGround=true; P.vel.y=0;}
  P.onGround=grounded(P.pos);

  P.pos.x=Math.max(.5,Math.min(WX-.5,P.pos.x));
  P.pos.z=Math.max(.5,Math.min(WZ-.5,P.pos.z));
  if(P.pos.y<-6){P.hp=0;}

  cam.position.copy(P.pos);
  cam.rotation.y=P.yaw;
  cam.rotation.x=P.pitch;

  if(P.hp<=0&&!P.dead){
    P.dead=true;
    document.getElementById('dscore').textContent='Score: '+P.score+'  Level: '+P.level;
    document.getElementById('dead').style.display='flex';
  }
}

// ════════════════ RAYCASTER ════════════════
const ray=new THREE.Raycaster(undefined,undefined,.05,5);
const CENTER2=new THREE.Vector2(0,0);

function getHit(){
  ray.setFromCamera(CENTER2,cam);
  const list=Object.values(meshes);
  if(!list.length) return null;
  const hits=ray.intersectObjects(list);
  return hits.length?hits[0]:null;
}

// ════════════════ BREAK / PLACE ════════════════
let brkTarget=null,brkProg=0,breaking=false;

function tickBreak(dt){
  const hit=getHit();
  if(hit) {hlBox.visible=true; hlBox.position.copy(hit.object.position);}
  else {hlBox.visible=false;}

  if(!breaking||!hit){
    if(brkTarget){brkTarget=null;brkProg=0;document.getElementById('brk').style.display='none';}
    return;
  }
  const{x,y,z,type}=hit.object.userData;
  const k=K(x,y,z);
  if(brkTarget!==k){brkTarget=k;brkProg=0;}
  const hard=DEFS[type]?.hard??1;
  if(hard>=100) return;
  brkProg+=dt/Math.max(.05,hard*.35);
  document.getElementById('brk').style.display='block';
  document.getElementById('brkf').style.width=Math.min(brkProg*100,100)+'%';
  if(brkProg>=1){
    spawnParticles(x,y,z,type);
    setBlock(x,y,z,null);
    P.score+=8; P.xp+=5; if(P.xp>=100){P.level++;P.xp=0;} updateHUD();
    showMsg('🪓 '+type);
    brkTarget=null;brkProg=0;
    document.getElementById('brk').style.display='none';
  }
}

function placeBlock(){
  if(P.dead) return;
  const hit=getHit(); if(!hit) return;
  const n=hit.face.normal;
  const{x,y,z}=hit.object.userData;
  const nx=Math.round(x+n.x),ny=Math.round(y+n.y),nz=Math.round(z+n.z);
  if(nx<0||nx>=WX||ny<=0||ny>=WY||nz<0||nz>=WZ) return;
  if(world[K(nx,ny,nz)]) return;
  const px=P.pos.x,pz=P.pos.z,py=P.pos.y;
  if(Math.abs(nx+.5-px)<.6&&Math.abs(nz+.5-pz)<.6&&ny+.5>py-1.85&&ny+.5<py+.1) return;
  setBlock(nx,ny,nz,selBlock);
  P.score+=2; updateHUD();
  showMsg('📦 '+selBlock);
}

// ════════════════ PARTICLES ════════════════
const parts=[];
function spawnParticles(x,y,z,type){
  const col=(DEFS[type]?.s||0x888888);
  for(let i=0;i<8;i++){
    const sz=.07+Math.random()*.08;
    const m=new THREE.Mesh(
      new THREE.BoxGeometry(sz,sz,sz),
      new THREE.MeshBasicMaterial({color:col})
    );
    m.position.set(x+.5+(Math.random()-.5)*.7,y+.5+(Math.random()-.5)*.7,z+.5+(Math.random()-.5)*.7);
    const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3;
    m._v=new THREE.Vector3(Math.cos(a)*sp,.5+Math.random()*4,Math.sin(a)*sp);
    m._life=1;
    scene.add(m);parts.push(m);
  }
}
function tickParticles(dt){
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p._v.y-=16*dt;
    p.position.addScaledVector(p._v,dt);
    p._life-=dt*2;
    if(p._life<=0){scene.remove(p);parts.splice(i,1);}
  }
}

// ════════════════ HOTBAR ════════════════
let selBlock=HOTBAR_TYPES[0];
function buildHotbar(){
  const hb=document.getElementById('hotbar'); hb.innerHTML='';
  HOTBAR_TYPES.forEach((t,i)=>{
    const s=document.createElement('div'); s.className='hs'+(i===0?' on':''); s.dataset.t=t;
    s.innerHTML=`${DEFS[t]?.icon||'?'}<span>${i+1}</span>`;
    s.addEventListener('pointerdown',e=>{e.preventDefault();e.stopPropagation();
      document.querySelector('.hs.on')?.classList.remove('on');
      s.classList.add('on'); selBlock=t; showMsg(t);
    });
    hb.appendChild(s);
  });
}
buildHotbar();
document.addEventListener('keydown',e=>{
  const n=parseInt(e.key);
  if(n>=1&&n<=9){
    const slots=document.querySelectorAll('.hs');
    if(slots[n-1]){document.querySelector('.hs.on')?.classList.remove('on');slots[n-1].classList.add('on');selBlock=slots[n-1].dataset.t;}
  }
});

// ════════════════ HUD / UI ════════════════
function updateHUD(){
  const hp=document.getElementById('hpr'); hp.innerHTML='';
  const hun=document.getElementById('hur'); hun.innerHTML='';
  for(let i=0;i<10;i++){
    const h=document.createElement('div'); h.style.cssText=`width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;`;
    h.textContent=i<Math.ceil(P.hp/2)?'❤️':'🖤'; hp.appendChild(h);
    const u=document.createElement('div'); u.style.cssText=h.style.cssText;
    u.textContent=i<Math.ceil(P.hunger/2)?'🍗':'⬛'; hun.appendChild(u);
  }
  document.getElementById('xpf').style.width=(P.xp%100)+'%';
  const hud=document.getElementById('hud');
  hud.innerHTML=`XYZ: ${P.pos.x.toFixed(1)} / ${P.pos.y.toFixed(1)} / ${P.pos.z.toFixed(1)}<br>FPS: ${fps}<br>${P.onGround?'Ground':'Air'} | Score:${P.score}`;
}

let _mt=null;
function showMsg(txt,dur=1600){
  const m=document.getElementById('msg');m.textContent=txt;m.style.opacity=1;
  if(_mt) clearTimeout(_mt);_mt=setTimeout(()=>m.style.opacity=0,dur);
}

// ════════════════ INPUT ════════════════
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){e.preventDefault(); if(P.onGround&&!P.dead){P.vel.y=JUMP;}}
  if(e.code==='KeyF') placeBlock();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

let locked=false;
canvas.addEventListener('click',()=>{ if(!locked) canvas.requestPointerLock?.(); });
document.addEventListener('pointerlockchange',()=>{
  locked=document.pointerLockElement===canvas;
  document.getElementById('hud').style.display=locked?'block':'none';
});
document.addEventListener('mousemove',e=>{
  if(!locked) return;
  P.yaw-=e.movementX*.0022;
  P.pitch=Math.max(-1.4,Math.min(1.4,P.pitch-e.movementY*.0022));
});
document.addEventListener('mousedown',e=>{
  if(!locked) return;
  if(e.button===0) breaking=true;
  if(e.button===2){e.preventDefault();placeBlock();}
});
document.addEventListener('mouseup',e=>{if(e.button===0){breaking=false;brkTarget=null;brkProg=0;document.getElementById('brk').style.display='none';}});
document.addEventListener('contextmenu',e=>e.preventDefault());

// ════════════════ MOUSE SCROLL SUPPORT ════════════════
document.addEventListener('wheel',e=>{
  if(P.dead) return;
  e.preventDefault();
  const slots=document.querySelectorAll('.hs');
  let current=Array.from(slots).findIndex(s=>s.classList.contains('on'));
  if(current===-1) current=0;
  const delta=e.deltaY>0?1:-1;
  const next=(current+delta+slots.length)%slots.length;
  document.querySelector('.hs.on')?.classList.remove('on');
  slots[next].classList.add('on');
  selBlock=slots[next].dataset.t;
  showMsg(selBlock);
},{passive:false});

// ════════════════ JOYSTICK ════════════════
let jX=0,jY=0,jId=null;
const jw=document.getElementById('jw');
const jk=document.getElementById('jk');
const jb=document.getElementById('jb');

function jCenter(){const r=jb.getBoundingClientRect();return{cx:r.left+r.width/2,cy:r.top+r.height/2};}
function updateJoy(dx,dy){
  const MAX=38,d=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx),dd=Math.min(d,MAX);
  jk.style.left=(39+Math.cos(a)*dd)+'px'; jk.style.top=(39+Math.sin(a)*dd)+'px';
  jX=dx/MAX; jY=dy/MAX;
  const l=Math.sqrt(jX*jX+jY*jY); if(l>1){jX/=l;jY/=l;}
}

// ── Touch joystick ──
jw.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];jId=t.identifier;const{cx,cy}=jCenter();updateJoy(t.clientX-cx,t.clientY-cy);},{passive:false});
jw.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches) if(t.identifier===jId){const{cx,cy}=jCenter();updateJoy(t.clientX-cx,t.clientY-cy);}},{passive:false});
jw.addEventListener('touchend',e=>{e.preventDefault();for(const t of e.changedTouches) if(t.identifier===jId){jId=null;jX=0;jY=0;jk.style.left='39px';jk.style.top='39px';}},{passive:false});

// ── Mouse joystick support ──
jw.addEventListener('mousedown',e=>{e.preventDefault();jId='mouse';const{cx,cy}=jCenter();updateJoy(e.clientX-cx,e.clientY-cy);});
document.addEventListener('mousemove',e=>{
  if(jId!=='mouse') return;
  const{cx,cy}=jCenter();
  updateJoy(e.clientX-cx,e.clientY-cy);
});
document.addEventListener('mouseup',e=>{
  if(jId==='mouse'){
    jId=null;jX=0;jY=0;
    jk.style.left='39px';jk.style.top='39px';
  }
});

let lId=null,lPrev={x:0,y:0};
const lz=document.getElementById('lz');
const LS=.0028;

// ── Touch look zone ──
lz.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];lId=t.identifier;lPrev={x:t.clientX,y:t.clientY};},{passive:false});
lz.addEventListener('touchmove',e=>{e.preventDefault();for(const t of e.changedTouches) if(t.identifier===lId){const dx=t.clientX-lPrev.x,dy=t.clientY-lPrev.y;P.yaw-=dx*LS*2.5;P.pitch=Math.max(-1.4,Math.min(1.4,P.pitch-dy*LS*2.5));lPrev={x:t.clientX,y:t.clientY};}},{passive:false});
lz.addEventListener('touchend',e=>{e.preventDefault();lId=null;},{passive:false});

// ── Mouse look zone support (when not in pointer lock) ──
lz.addEventListener('mousedown',e=>{e.preventDefault();lId='mouse';lPrev={x:e.clientX,y:e.clientY};});
document.addEventListener('mousemove',e=>{
  if(lId!=='mouse'||locked) return;
  const dx=e.clientX-lPrev.x,dy=e.clientY-lPrev.y;
  P.yaw-=dx*LS*2.5;
  P.pitch=Math.max(-1.4,Math.min(1.4,P.pitch-dy*LS*2.5));
  lPrev={x:e.clientX,y:e.clientY};
});
document.addEventListener('mouseup',e=>{if(lId==='mouse'){lId=null;}});

document.getElementById('bj').addEventListener('pointerdown',e=>{e.preventDefault();if(P.onGround&&!P.dead){P.vel.y=JUMP;}});
const bbtn=document.getElementById('bb');
bbtn.addEventListener('pointerdown',e=>{e.preventDefault();breaking=true;});
bbtn.addEventListener('pointerup',e=>{e.preventDefault();breaking=false;brkTarget=null;brkProg=0;document.getElementById('brk').style.display='none';});
bbtn.addEventListener('pointerleave',()=>{breaking=false;});
document.getElementById('bp').addEventListener('pointerdown',e=>{e.preventDefault();placeBlock();});

document.getElementById('btnR').addEventListener('click',()=>{
  P.hp=20;P.hunger=20;P.xp=0;P.dead=false;
  P.pos.copy(respawnPos()); P.vel.set(0,0,0);
  document.getElementById('dead').style.display='none'; updateHUD();
});

// ════════════════ DAY CYCLE ════════════════
let dayt=0.3;
function tickSky(dt){
  dayt=(dayt+dt*.004)%1;
  const t=dayt;
  let sk,fl,si;
  if(t>.28&&t<.72){const d=Math.min((t-.28)/.2,((.72-t)/.2));sk=new THREE.Color(0x7EB6FF).lerp(new THREE.Color(0xE06020),1-d);fl=sk;si=.4+d*.7;}
  else{sk=new THREE.Color(0x080C18);fl=new THREE.Color(0x050810);si=.04;}
  skyMat.color.lerp(sk,.06); scene.fog.color.lerp(fl,.06);
  dirLight.intensity=THREE.MathUtils.lerp(dirLight.intensity,si,.06);
  const ang=t*Math.PI*2-Math.PI*.5;
  dirLight.position.set(Math.cos(ang)*2,Math.sin(ang)*2,1);
}

// ════════════════ FPS COUNTER ════════════════
let fps=60,fc=0,ft=0;

// ════════════════ MAIN LOOP ════════════════
const clk=new THREE.Clock();
let started=false;

function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clk.getDelta(),.05);
  if(!started) return;
  fc++;ft+=dt;if(ft>=.5){fps=~~(fc/ft);fc=0;ft=0;}
  tickPhysics(dt);
  tickBreak(dt);
  tickParticles(dt);
  tickSky(dt);
  if(fc%6===0) updateHUD();
  renderer.render(scene,cam);
}
loop();

// ════════════════ START ════════════════
function startGame(){
  document.getElementById('start').style.display='none';
  document.getElementById('hud').style.display=MOB?'block':'none';
  if(MOB){
    document.getElementById('jw').style.display='block';
    document.getElementById('lz').style.display='block';
    document.getElementById('rb').style.display='flex';
    document.getElementById('cross').style.display='block';
  } else {
    canvas.requestPointerLock?.();
  }
  P.pos.copy(respawnPos());
  clk.start(); started=true;
  updateHUD();
  showMsg('🎮 WASD=เดิน  Space=กระโดด  คลิกซ้าย=ทำลาย  คลิกขวา=วาง  1-9=เลือกบล็อก  Scroll=เลือกบล็อก',4000);
}

document.getElementById('stip').textContent='World ready! '+Object.keys(world).length+' blocks';
document.getElementById('btnS').style.display='block';
document.getElementById('btnS').addEventListener('click',startGame);

window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

setInterval(()=>{
  if(!started||P.dead) return;
  P.hunger=Math.max(0,P.hunger-.5);
  if(P.hunger===0) P.hp=Math.max(1,P.hp-1);
},6000);
</script>
